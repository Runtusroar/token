server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for dynamic upstream hostnames (Docker embedded DNS).
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Cache static assets (Vite hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------------------------
    # Claude Code install mirror
    #
    # Users behind networks that can't reach claude.ai / storage.googleapis.com
    # install via:
    #   curl -fsSL https://<this-host>/install.sh | bash         # macOS / Linux
    #   irm https://<this-host>/install.ps1 | iex                # Windows PS
    #
    # Strategy: reverse-proxy the two bootstrap scripts and rewrite the GCS
    # bucket URL embedded inside them to point back at this host, so the
    # subsequent binary download also flows through the mirror. No cron
    # needed — nginx always serves whatever Anthropic publishes right now.
    # -------------------------------------------------------------------------

    location = /install.sh {
        proxy_pass https://downloads.claude.ai/claude-code-releases/bootstrap.sh;
        proxy_set_header Host downloads.claude.ai;
        proxy_set_header Accept-Encoding "";
        proxy_ssl_server_name on;
        proxy_ssl_name downloads.claude.ai;
        proxy_read_timeout 60s;

        sub_filter_types *;
        sub_filter_once off;
        sub_filter 'https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases' 'https://$host/claude-code-dist/claude-code-releases';

        default_type text/x-shellscript;
    }

    location = /install.ps1 {
        proxy_pass https://downloads.claude.ai/claude-code-releases/bootstrap.ps1;
        proxy_set_header Host downloads.claude.ai;
        proxy_set_header Accept-Encoding "";
        proxy_ssl_server_name on;
        proxy_ssl_name downloads.claude.ai;
        proxy_read_timeout 60s;

        sub_filter_types *;
        sub_filter_once off;
        sub_filter 'https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases' 'https://$host/claude-code-dist/claude-code-releases';

        default_type 'text/plain; charset=utf-8';
    }

    # Binary + manifest passthrough. No sub_filter here — binaries stream as-is.
    location /claude-code-dist/ {
        rewrite ^/claude-code-dist/(.*)$ /claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/$1 break;
        proxy_pass https://storage.googleapis.com;
        proxy_set_header Host storage.googleapis.com;
        proxy_set_header Accept-Encoding '';
        proxy_ssl_server_name on;
        proxy_ssl_name storage.googleapis.com;
        proxy_buffering on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
